services:
  # ── EDEN API Backend ────────────────────────────────────────────────
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - EDEN_SIMULATE=true
      - MQTT_BROKER_HOST=mosquitto
    volumes:
      - eden-data:/app/data
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  # ── Dashboard Frontend ──────────────────────────────────────────────
  dashboard:
    build:
      context: .
      target: dashboard
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── MQTT Broker ─────────────────────────────────────────────────────
  mosquitto:
    image: public.ecr.aws/docker/library/eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  eden-data:
